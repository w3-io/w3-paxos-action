    outputs:
      result:
        type: object
        description: "{id, status, account_details}"
  - name: list-fiat-accounts
    description: List registered fiat (bank) accounts.
    inputs:
      profile-id:
        type: string
        required: false
        description: Filter by profile
      limit:
        type: string
        required: false
        description: Page size
      cursor:
        type: string
        required: false
        description: Pagination cursor
    outputs:
