  - name: get-profile
    description: Get profile details by ID.
    inputs:
      profile-id:
        type: string
        required: true
        description: Profile ID
    outputs:
      result:
        type: object
        description: Full profile details
  - name: update-profile
    description: Update a profile.
    inputs:
      profile-id:
        type: string
        required: true
        description: Profile ID
      body:
        type: object
        required: true
        description: Updated profile params
    outputs:
      result:
        type: object
