  - name: list-deposit-addresses
    description: List deposit addresses with optional profile filter.
    inputs:
      profile-id:
        type: string
        required: false
        description: Filter by profile
      limit:
        type: string
        required: false
        description: Page size
      cursor:
        type: string
        required: false
        description: Pagination cursor
    outputs:
