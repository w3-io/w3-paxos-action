        description: "{source_profile_id, destination_profile_id, amount, asset}"
    outputs:
      result:
        type: object
        description: "{id, amount, asset, status}"
  - name: create-paxos-transfer
    description: Transfer funds between Paxos customers.
    inputs:
      body:
        type: object
        required: true
        description: "{source_profile_id, destination_profile_id, amount, asset}"
    outputs:
      result:
        type: object
        description: "{id, amount, asset, status}"

