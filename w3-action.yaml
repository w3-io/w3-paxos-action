    outputs:
      result:
        type: object
        description: Updated deposit
  - name: reject-crypto-deposit
    description: Reject a pending crypto deposit.
    inputs:
      id:
        type: string
        required: true
        description: Deposit ID
      body:
        type: object
        required: true
        description: Rejection params
    outputs:
      result:
        type: object
        description: Rejected deposit

  # ── Crypto Withdrawals ───────────────────────────────────────
  - name: create-crypto-withdrawal
    description: Withdraw crypto to an external blockchain address.
    inputs:
      body:
        type: object
        required: true
        description:
          "{profile_id, amount, asset, destination_address, crypto_network,
          ref_id}"
    outputs:
      result:
        type: object
        description: "{id, amount, asset, status, fee}"
  - name: list-crypto-destination-addresses
    description: List approved crypto withdrawal destination addresses.
    inputs:
      profile-id:
        type: string
        required: false
        description: Filter by profile
      limit:
        type: string
        required: false
        description: Page size
      cursor:
        type: string
        required: false
        description: Pagination cursor
    outputs:
      result:
        type: object
        description: "{items: [destination_addresses]}"
  - name: put-crypto-destination-address
    description: Create or update a crypto destination address.
    inputs:
      body:
        type: object
        required: true
