kind: integration
name:
  Institutional crypto — stablecoins (PYUSD/USDP/USDG), custody, trading, settlement,
  and orchestration
version: 0.1.0
repo: w3-io/w3-paxos-action
partner: Paxos
description:
  Institutional crypto — stablecoins (PYUSD/USDP/USDG), custody, trading,
  settlement, and orchestration
context:
  "Paxos is the regulated infrastructure behind PYUSD (issued for PayPal),
  USDP (Pax Dollar), and USDG (Global Dollar). This action provides institutional-grade
  crypto operations: identity/KYC, custody, trading, stablecoin minting/redemption,
  bilateral settlement, and automated orchestration workflows.


  **Stablecoin operations:** Mint PYUSD/USDP from USD or redeem back to USD at 1:1
  via create-conversion. This is how stablecoins are created and destroyed at the
  issuer level — not a swap, but actual mint/burn. For on-chain PYUSD operations (transfer,
  approve, balance), use the native ethereum/solana chain actions with addresses from
  the PYUSD integration guide.


  **Orchestration:** Automate complex asset movements. Create rules that trigger on
  deposit: USD arrives → auto-convert to PYUSD → transfer to destination profile.
  Or the reverse: PYUSD arrives → redeem to USD → wire to bank. One API call sets
  up the recurring workflow. Use create-orchestration for one-off flows, create-orchestration-rule
  for automated triggers.


  **Trading:** Place market/limit orders on Paxos markets (BTC_USD, ETH_USD, etc.).
  Execute held-rate quotes for guaranteed pricing. Issuer quotes for institutional
  mint/redeem at Paxos's rate.


  **Settlement:** Bilateral OTC-style transactions. Create a settlement, counterparty
  affirms, funds move. For institutional trading desks.


  **Rewards:** Monitor addresses for stablecoin reward eligibility. Set up automated
  claim schedules and payout groups.


  **Key distinction from Iron/Stripe:** Paxos operates at the issuer level. Iron and
  Stripe onramp end-users (fiat → crypto delivery). Paxos mints and redeems the stablecoins
  themselves. Use Paxos for treasury/institutional operations. Use Iron/Stripe for
  customer-facing on/off-ramp.


  See the PYUSD integration guide for on-chain contract addresses. See the fiat-to-onchain
  cookbook for combining Paxos mint with on-chain delivery.


  109 commands total. OAuth2 client credentials auth. Sandbox: api.sandbox.paxos.com.
  Production: api.paxos.com.

  "
commands:
  # ── Identity ─────────────────────────────────────────────────
  - name: create-identity
    description: Create a person or institution identity for KYC.
    inputs:
      body:
        type: object
        required: true
        description: Identity params (type, person/institution details)
    outputs:
      result:
        type: object
        description: "{id, type, status}"
  - name: list-identities
    description: List identities with pagination.
    inputs:
      limit:
        type: string
        required: false
        description: Page size
      cursor:
        type: string
        required: false
        description: Pagination cursor
    outputs:
      result:
        type: object
        description: "{items: [identities]}"
  - name: get-identity
    description: Get identity details and KYC status.
    inputs:
      identity-id:
        type: string
        required: true
        description: Identity ID
    outputs:
      result:
        type: object
        description: Full identity with status, details, documents
  - name: update-identity
    description: Update an existing identity.
    inputs:
      identity-id:
        type: string
        required: true
        description: Identity ID
      body:
        type: object
        required: true
        description: Updated identity params
    outputs:
      result:
        type: object
        description: Updated identity
  - name: upload-document
    description: Upload a KYC document to an identity.
    inputs:
      identity-id:
        type: string
        required: true
        description: Identity ID
      body:
        type: object
        required: true
        description: Document params (type, content)
    outputs:
      result:
        type: object
        description: Uploaded document
  - name: list-documents
    description: List documents for an identity.
    inputs:
      identity-id:
        type: string
        required: true
        description: Identity ID
    outputs:
      result:
        type: object
        description: "{items: [documents]}"
  - name: sandbox-set-identity-status
    description: Set identity KYC status in sandbox (for testing).
    inputs:
      identity-id:
        type: string
        required: true
        description: Identity ID
      body:
        type: object
        required: true
        description: "{status}"
    outputs:
      result:
        type: object
        description: Updated identity status

  # ── Identity Controls ────────────────────────────────────────
