      result:
        type: object
        description: "{items: [{market, price, timestamp}]}"
  - name: list-tickers
    description: Get 24-hour ticker stats across all markets.
    outputs:
      result:
        type: object
        description: "{items: [{market, best_bid, best_ask, volume_24h}]}"

