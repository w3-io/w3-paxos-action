        type: object
        description: "{items: [fiat_accounts]}"
  - name: get-fiat-account
    description: Get fiat account details by ID.
    inputs:
      id:
        type: string
        required: true
        description: Fiat account ID
    outputs:
      result:
        type: object
        description: Full fiat account details
  - name: update-fiat-account
    description: Update a fiat account.
    inputs:
      id:
        type: string
        required: true
        description: Fiat account ID
      body:
        type: object
        required: true
        description: Updated account details
    outputs:
      result:
