  # ── Stablecoin Conversion ────────────────────────────────────
  - name: create-conversion
    description:
      "Mint or redeem stablecoins at 1:1 with USD. This is issuer-level minting
      — USD in your Paxos profile becomes PYUSD/USDP/USDG on-chain, or vice versa.

      "
    inputs:
      body:
