  - name: list-conversions
    description: List stablecoin conversions with optional filters.
    inputs:
      profile-id:
        type: string
        required: false
        description: Filter by profile
      status:
        type: string
        required: false
        description: Filter by status
      limit:
        type: string
        required: false
        description: Page size
      cursor:
        type: string
        required: false
        description: Pagination cursor
    outputs:
      result:
        type: object
        description: "{items: [conversions]}"
  - name: get-conversion
    description: Get conversion details.
    inputs:
